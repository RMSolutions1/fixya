name: Sync padrones oficiales

on:
  schedule:
    # Lunes 06:00 UTC — ~03:00 Argentina
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: sync-padrones
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Sincronizar COPAIPA, Gasnor y Aguas del Norte
        run: npm run sync:padrones
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SEED_DEMO_PASSWORD: ${{ secrets.SEED_DEMO_PASSWORD }}
